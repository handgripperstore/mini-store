<!DOCTYPE html>
<html>
<head>
  <title>Mini Store</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6f8;
    }
    header {
      background: #111827;
      color: white;
      padding: 20px;
      text-align: center;
      font-size: 22px;
      font-weight: bold;
    }
    .container {
      display: flex;
      justify-content: center;
      gap: 40px;
      padding: 60px;
      flex-wrap: wrap;
    }
    .card {
      background: white;
      width: 320px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.05);
      padding: 20px;
      text-align: center;
      transition: 0.2s ease;
    }
    .card:hover {
      transform: translateY(-5px);
    }
    .card img {
      width: 100%;
      height: 220px;
      object-fit: contain;
    }
    .price {
      margin: 15px 0;
      font-size: 18px;
    }
    .strike {
      text-decoration: line-through;
      color: #999;
      margin-right: 10px;
    }
    button {
      padding: 12px 20px;
      background: #111827;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      width: 100%;
      font-size: 15px;
    }
    button:hover {
      background: #2563eb;
    }
  </style>
</head>
<body>

<header>Mini Store</header>

<div class="container">

  <div class="card">
    <img src="handgripper.jpg" alt="Hand Gripper">
    <h3>Hand Gripper</h3>
    <div class="price">
      <span class="strike">₹499</span>
      <strong>₹10</strong>
    </div>
    <button onclick="buy('gripper')">Buy Now</button>
  </div>

  <div class="card">
    <img src="pen.jpg" alt="Pen">
    <h3>Premium Pen</h3>
    <div class="price">
      <span class="strike">₹50</span>
      <strong>₹10</strong>
    </div>
    <button onclick="buy('pen')">Buy Now</button>
  </div>

</div>

<script>
function buy(product) {
  localStorage.setItem("selectedProduct", product);
  window.location.href = "details.html";
}
</script>

</body>
</html>
